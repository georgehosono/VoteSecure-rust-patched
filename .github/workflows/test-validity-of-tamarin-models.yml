# .github/workflows/test-validity-of-tamarin-models.yml
# Author: Daniel M. Zimmerman
# Created: 2025-06-06
# Modified: 2026-04-06

name: Test Validity of Tamarin Models

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'models/cryptography/tamarin/**'
  push:
    branches:
      - 'main'
    paths:
      - 'models/cryptography/tamarin/**'
  workflow_dispatch:

jobs:
  test:
    name: Generate and Check Syntax for Tamarin Models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_READ_ONLY_TOKEN_USERNAME }}
          password: ${{ secrets.DOCKER_READ_ONLY_TOKEN }}

      - name: Run `make ci` in `models/cryptography/tamarin`
        run: |
          echo "Processing models/cryptography/tamarin"
          cd models/cryptography/tamarin
          USE_DOCKER=yes make ci
