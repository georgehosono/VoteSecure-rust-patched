# .github/workflows/verify-tamarin-models.yml
# Author: Daniel M. Zimmerman
# Created: 2025-06-06
# Modified: 2026-04-06

name: Verify Tamarin Models
on:
  # Run CV automatically only after the corresponding CI workflow
  # completes successfully on `main`. To test this before merge, set
  # the repo variable `SLOW_CV_TEST_BRANCH` to your branch name.
  # We also allow manual dispatch.
  workflow_run:
    workflows:
      - Test Validity of Tamarin Models
    types:
      - completed

  workflow_dispatch:
    inputs:
      timeout:
        description: 'Timeout for Tamarin CV Run'
        required: false
        default: '90m'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

env:
  TIMEOUT: ${{ github.event.inputs.timeout || '90m' }}

jobs:
  test:
    name: Generate and Verify Executability/Safety of Tamarin Models
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == vars.SLOW_CV_TEST_BRANCH))
    runs-on: blacksmith-16vcpu-ubuntu-2404 # was ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_READ_ONLY_TOKEN_USERNAME }}
          password: ${{ secrets.DOCKER_READ_ONLY_TOKEN }}

      - name: Run `make cv` in `models/cryptography/tamarin`
        run: |
          echo "Processing models/cryptography/tamarin"
          cd models/cryptography/tamarin
          USE_DOCKER=yes timeout $TIMEOUT make cv

      - name: Save the Generated Tamarin Outputs
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: tamarin-output
          path: models/cryptography/tamarin/output/*
