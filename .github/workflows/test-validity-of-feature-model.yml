# .github/workflows/test-validity-of-feature-model.yml
# Author: Daniel M. Zimmerman
# Created: 2024-11-21
# Modified: 2026-03-31

name: Test Validity of Feature Model

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'models/feature-model/**'
  push:
    branches:
      - 'main'
    paths:
      - 'models/feature-model/**'
  workflow_dispatch:

jobs:
  test:
    name: Build Feature Model Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_READ_ONLY_TOKEN_USERNAME }}
          password: ${{ secrets.DOCKER_READ_ONLY_TOKEN }}

      - name: Pull Docker Image
        run: docker pull freeandfair/de-ple-e2eviv:latest

      - name: Bootstrap Feature Model Python Environment
        run: |
          make -C models/feature-model python-venv

      - name: Run `make ci` in `models/feature-model`
        run: |
          echo "Processing models/feature-model"
          make -C models/feature-model ci
